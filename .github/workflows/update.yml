name: Update ETF Data for Streamlit & Blog

on:
  schedule:
    - cron: '0 7 * * 1-5' # 한국 시간 오후 5시
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 데이터 업데이트 스크립트 및 블로그 자동 포스팅 실행
        env:
          BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          # [추가] Refresh Token 자동 갱신 시 GitHub Secret을 업데이트하는 데 필요
          GH_PAT: ${{ secrets.GH_PAT }}

      # GITHUB_REPOSITORY는 GitHub Actions에서 자동으로 주입되므로 별도 설정 불필요
        run: python update_data.py

      - name: 생성된 CSV 파일 깃허브에 자동 커밋 & 푸시
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add etf_data.csv
          git commit -m "Auto-update ETF CSV data" || exit 0
          git pull origin main --rebase
          git push
